<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A2C7A"/>
      <stop offset="100%" stop-color="#0F0E2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="500" ry="220" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="120" cy="90" r="2" fill="white" opacity="0.7"/>
  <circle cx="1080" cy="120" r="3" fill="white" opacity="0.8"/>
  <circle cx="950" cy="500" r="2" fill="white" opacity="0.6"/>
  <circle cx="200" cy="450" r="2" fill="white" opacity="0.5"/>
  <circle cx="60" cy="500" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="1100" cy="450" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="320" cy="120" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="850" cy="100" r="1.5" fill="white" opacity="0.6"/>

  <!-- Clover -->
  <text x="600" y="190" font-size="80" text-anchor="middle">🍀</text>

  <!-- Title -->
  <text x="600" y="340" font-family="Pretendard, -apple-system, system-ui, sans-serif" font-size="128" font-weight="800" fill="#FFD700" text-anchor="middle" letter-spacing="-3">LuckyAI</text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="Pretendard, -apple-system, system-ui, sans-serif" font-size="34" font-weight="600" fill="#F5E6D3" text-anchor="middle">당신의 모든 것이 길조입니다</text>

  <!-- Slogan -->
  <text x="600" y="450" font-family="Pretendard, -apple-system, system-ui, sans-serif" font-style="italic" font-size="22" fill="#F5E6D3" fill-opacity="0.55" text-anchor="middle">"AI-powered optimism, scientifically unfounded."</text>

  <!-- Features -->
  <text x="600" y="555" font-family="Pretendard, -apple-system, system-ui, sans-serif" font-size="26" fill="#F5E6D3" fill-opacity="0.7" text-anchor="middle" letter-spacing="2">✋  손금 분석   ·   🔯  사주 풀이   ·   ✨  불운 변환</text>
</svg>
